[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"
read_only = " ¾░î¥"
read_only_style = "red"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "ÔÇĞ/"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = "´äĞ "
style = "bold purple"
truncation_length = 32
truncation_symbol = "ÔÇĞ"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ô£İ${count}"
conflicted = "~${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold red"

[git_commit]
tag_symbol = ' ´ÉÆ '

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"
vimcmd_replace_one_symbol = "[ÔûÂ](bold purple)"
vimcmd_replace_symbol = "[ÔûÂ](bold purple)"
vimcmd_visual_symbol = "[V](bold yellow)"

[status]
format = "[$symbol$status]($style) "
symbol = "Ô£İ"
success_symbol = ""
signal_symbol = "ÔÜí "
style = "bold red"
map_symbol = true
pipestatus = true
disabled = false

[cmd_duration]
format = "[ $duration]($style) "
style = "yellow"
min_time = 3_000
show_milliseconds = false

[jobs]
format = "[$symbol$number]($style) "
symbol = "ÔÜÖ "
style = "bold cyan"
number_threshold = 1
symbol_threshold = 1

[direnv]
format = "[$symbol$loaded/$allowed]($style) "
symbol = "¯İô "
style = "bold orange"
disabled = false
allowed_msg = ""
not_allowed_msg = "Ô£ù"
denied_msg = "!!"
loaded_msg = ""
unloaded_msg = ""

[docker_context]
format = "[$symbol$context]($style) "
symbol = "´îê "
style = "bold blue"
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
only_with_files = true

[dotnet]
format = "[$symbol($version)(  $tfm)]($style) "
symbol = "¯Ø┐ "
style = "bold purple"
detect_files = ["global.json", "project.json", "Directory.Build.props", "Directory.Build.targets", "Packages.props"]
detect_extensions = ["csproj", "fsproj", "xproj", "sln"]

[python]
format = '[$symbol$pyenv_prefix($version)(\($virtualenv\))]($style) '
symbol = "¯êÁ "
style = "bold yellow"
detect_files = ["requirements.txt", "setup.py", "setup.cfg", "pyproject.toml", "Pipfile", ".python-version"]
detect_extensions = ["py"]

[nodejs]
format = "[$symbol($version)]($style) "
symbol = "¯£İ "
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_extensions = ["js", "ts", "mjs", "cjs"]

[ruby]
format = "[$symbol($version)]($style) "
symbol = "¯Şæ "
style = "bold red"
detect_files = ["Gemfile", ".ruby-version"]
detect_extensions = ["rb"]

[golang]
format = "[$symbol($version)]($style) "
symbol = "¯İğ "
style = "bold cyan"
detect_files = ["go.mod", "go.sum", "go.work"]
detect_extensions = ["go"]

[kubernetes]
format = "[$symbol$context( \\($namespace\\))]($style) "
symbol = "¾▒â¥ "
style = "bold cyan"
disabled = false

[terraform]
format = "[$symbol$workspace]($style) "
symbol = "¾▒üó "
style = "bold purple"
detect_files = [".terraform", "*.tf"]
detect_extensions = ["tf", "tfvars"]

[aws]
format = '[$symbol($profile)(\[$duration\])]($style) '
symbol = "´â» "
style = "bold yellow"

[gcloud]
format = '[$symbol$account(@$domain)(\($project\))]($style) '
symbol = "¾▒çÂ "
style = "bold blue"

[azure]
format = "[$symbol($subscription)]($style) "
symbol = "¾░áà "
style = "bold blue"
disabled = false

[username]
format = "[$user]($style)[@](dimmed white)"
style_user = "dimmed white"
style_root = "bold red"
show_always = false

[hostname]
format = "[$ssh_symbol$hostname]($style) "
style = "dimmed white"
ssh_only = false
trim_at = "."
ssh_symbol = "¾░ó╣ "

[time]
format = "[$time]($style)"
style = "dimmed white"
time_format = "%H:%M"
disabled = false
