"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
$git_branch\
$git_status\
$git_state\
$line_break\
$character"""

right_format = """
$status\
$cmd_duration\
$jobs\
$direnv\
$python\
$nodejs\
$ruby\
$golang\
$dotnet\
$docker_context\
$terraform\
$kubernetes\
$aws\
$gcloud\
$azure\
