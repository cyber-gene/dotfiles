"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
$git_branch\
$git_status\
$git_state\
$line_break\
$character"""

right_format = """
$status\
$cmd_duration\
$jobs\
$direnv\
$python\
$nodejs\
$ruby\
$golang\
$terraform\
$kubernetes\
$aws\
$gcloud\
$azure\
$username\
$hostname\
$time"""

add_newline = true

[os]
format = "[$symbol]($style) "
style = "bold white"
disabled = false

[os.symbols]
Macos = "ÔÖĻ"
Linux = "ÔÖľ"
Windows = "ÔÖļ"

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"
read_only = " ůįĆĺ"
read_only_style = "red"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "‚Ä¶/"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = "ÔĄ¶ "
style = "bold purple"
truncation_length = 32
truncation_symbol = "‚Ä¶"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "¬Ľ${count}"
deleted = "‚úė${count}"
conflicted = "~${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold red"

[character]
success_symbol = "[‚ĚĮ](bold green)"
error_symbol = "[‚ĚĮ](bold red)"
vimcmd_symbol = "[‚Ěģ](bold green)"
vimcmd_replace_one_symbol = "[‚Ė∂](bold purple)"
vimcmd_replace_symbol = "[‚Ė∂](bold purple)"
vimcmd_visual_symbol = "[V](bold yellow)"

[status]
format = "[$symbol$status]($style) "
symbol = "‚úė"
success_symbol = ""
signal_symbol = "‚ö° "
style = "bold red"
map_symbol = true
pipestatus = true
disabled = false

[cmd_duration]
format = "[ $duration]($style) "
style = "yellow"
min_time = 3_000
show_milliseconds = false

[jobs]
format = "[$symbol$number]($style) "
symbol = "‚öô "
style = "bold cyan"
number_threshold = 1
symbol_threshold = 1

[direnv]
format = "[$symbol$loaded/$allowed]($style) "
symbol = "direnv "
style = "bold orange"
disabled = false
allowed_msg = ""
not_allowed_msg = "‚úó"
denied_msg = "!!"
loaded_msg = ""
unloaded_msg = ""

[python]
format = '[$symbol$pyenv_prefix($version)(\($virtualenv\))]($style) '
symbol = "Óīõ "
style = "bold yellow"
detect_files = ["requirements.txt", "setup.py", "setup.cfg", "pyproject.toml", "Pipfile", ".python-version"]
detect_extensions = ["py"]

[nodejs]
format = "[$symbol($version)]($style) "
symbol = "ůįéô "
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_extensions = ["js", "ts", "mjs", "cjs"]

[ruby]
format = "[$symbol($version)]($style) "
symbol = "Óąĺ "
style = "bold red"
detect_files = ["Gemfile", ".ruby-version"]
detect_extensions = ["rb"]

[golang]
format = "[$symbol($version)]($style) "
symbol = "Óėß "
style = "bold cyan"
detect_files = ["go.mod", "go.sum", "go.work"]
detect_extensions = ["go"]

[kubernetes]
format = "[$symbol$context( \\($namespace\\))]($style) "
symbol = "‚ėł "
style = "bold cyan"
disabled = false

[terraform]
format = "[$symbol$workspace]($style) "
symbol = "ůĪĀĘ "
style = "bold purple"
detect_files = [".terraform", "*.tf"]
detect_extensions = ["tf", "tfvars"]

[aws]
format = '[$symbol($profile)(\[$duration\])]($style) '
symbol = "ůįłŹ "
style = "bold yellow"

[gcloud]
format = '[$symbol$account(@$domain)(\($project\))]($style) '
symbol = "ÔÜ† "
style = "bold blue"

[azure]
format = "[$symbol($subscription)]($style) "
symbol = "ůį†Ö "
style = "bold blue"
disabled = false

[username]
format = "[$user]($style)[@](dimmed white)"
style_user = "dimmed white"
style_root = "bold red"
show_always = false

[hostname]
format = "[$ssh_symbol$hostname]($style) "
style = "dimmed white"
ssh_only = false
trim_at = "."
ssh_symbol = "ůįĘĻ "

[time]
format = "[$time]($style)"
style = "dimmed white"
time_format = "%H:%M"
disabled = false
