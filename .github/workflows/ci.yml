name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell:
    name: Shell linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install zsh and shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y zsh shellcheck

      - name: zsh syntax check
        run: |
          find . -name '*.zsh' -not -path './node_modules/*' -print0 | xargs -0 -I{} zsh -n {}
          zsh -n dot_zshrc

      - name: bash syntax check
        run: find . -name '*.sh' -not -path './node_modules/*' -print0 | xargs -0 bash -n

      - name: ShellCheck
        run: |
          find . \( -name '*.zsh' -o -name '*.sh' \) -not -path './node_modules/*' -print0 | xargs -0 shellcheck --shell=bash
          shellcheck --shell=bash dot_zshrc

  toml:
    name: TOML linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: TOML syntax check
        run: |
          python3 -c "
          import tomllib, sys, pathlib
          skip = set()
          ok = True
          for f in sorted(pathlib.Path('.').rglob('*.toml')):
              if f in skip:
                  continue
              try:
                  with open(f, 'rb') as fp:
                      tomllib.load(fp)
                  print('OK:', f)
              except Exception as e:
                  print('ERROR:', f, '-', e)
                  ok = False
          sys.exit(0 if ok else 1)
          "

  markdown:
    name: Markdown linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run lint:md


  chezmoi:
    name: chezmoi dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: chezmoi apply --dry-run
        run: |
          chezmoi apply \
            --dry-run \
            --source="$GITHUB_WORKSPACE" \
            --destination="$HOME" \
            --exclude=externals,scripts
